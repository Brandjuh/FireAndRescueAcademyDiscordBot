# Fire & Rescue Academy Discord Bot — configuration
#
# Copy this file to `config.yaml` and fill in the values.
# Secrets (tokens, passwords) go in `.env` — NOT in this file.

database:
  # SQLite database file. Relative paths resolve against the working directory.
  path: data/fra_bot.sqlite3

web:
  # The operator web console (dashboard, member management, settings)
  # served from inside the bot process: http://<pi-ip>:8462/ on the home
  # network. Every page requires the operator password — WEB_PASSWORD in
  # .env, or the generated one shown by `!fra web` in Discord. Set host
  # to 127.0.0.1 to restrict the console to the Pi itself again.
  enabled: true
  host: 0.0.0.0
  port: 8462

missionchief:
  base_url: https://www.missionchief.com
  # Alliance id as it appears in /verband/mitglieder/<id>
  alliance_id: 1621
  # Cookie jar persisted between restarts so we don't re-login every boot.
  cookie_path: data/cookies.json
  # Human-like pacing between requests to MissionChief (seconds).
  # Every request waits a random delay in [min_delay, max_delay].
  # WARNING: keep max_delay small (<= ~12). The average delay caps the bot's
  # total throughput for EVERYTHING (syncs, board polls, guides, requests);
  # e.g. max_delay 60 -> ~2 requests/min, which is less than the background
  # jobs alone need — the queue then grows forever and the bot appears hung.
  min_delay: 4.0
  max_delay: 9.0
  # Hard safety cap: never exceed this many requests per minute.
  max_requests_per_minute: 10
  # Pause all scraping for this many minutes after repeated failures.
  circuit_breaker_cooldown_minutes: 15

sync:
  # All intervals in minutes. Jitter is applied automatically so runs
  # don't happen at exactly the same second every time.
  members_interval: 60          # full member list sweep (~47+ pages)
  applications_interval: 5      # /verband/bewerbungen
  logs_interval: 15             # /alliance_logfiles (incremental)
  treasury_interval: 30         # /verband/kasse balance + income snapshot
  expenses_interval: 60         # incremental expenses sync
  # Initial expenses backfill (3150+ pages) runs in slow chunks so it
  # stays human-like. Pages per chunk; a chunk runs once per interval.
  # 30 pages / 15 min completes ~3150 pages in a bit over a day.
  expenses_backfill_pages_per_chunk: 30
  expenses_backfill_interval: 15
  # Full alliance-log history backfill (walks every page back to the
  # alliance's start; a few thousand pages). Runs in slow chunks and marks
  # old rows as already-posted so history never floods Discord. Resumable.
  logs_backfill_pages_per_chunk: 20
  logs_backfill_interval: 15

discord:
  # Guild (server) id the bot operates in.
  guild_id: 0
  # Channel ids (0 = disabled)
  channels:
    admin_log: 0          # bot health, errors, sync summaries
    applications: 0       # new alliance application alerts
    member_events: 0      # joins / leaves / role & contribution changes
    alliance_logs: 0      # mirrored MissionChief alliance log feed
    reports: 0            # daily / monthly income reports
    member_actions: 0     # admin feed of every member's bot-side action
                          # (requests, verify, profile edits; 0 = feed off,
                          # actions still record for the per-member view)
    game_sync: 0          # PRIVATE intake channel for the profile-sync
                          # userscript webhook (tools/fra-profile-sync.user.js):
                          # members' own buildings/vehicles land here as JSON,
                          # feeding /profile and !hotspots. 0 = off.
                          # (Omitting the key falls back to the FRA intake
                          # channel baked into config.py, like academy_panel.)
    admin_approvals: 0    # approve/deny embeds for requests needing a decision
    member_panel: 0       # member-management panel (dossier button)
    request_panel: 0      # training/building request panel
    # Eventpinger: role pings for every alliance mission/event the bot
    # actually starts (Notify-Event role + resolved region role).
    event_pings: 1421242306136113254
    # Missions-database forum (see automation.missions_forum). 0 = off.
    missions_forum: 0
    # New-mission announcements (link to the forum post) land here when
    # automation.missions_forum.announce_new is on.
    mission_announce: 1524842963316773036
    # In-game DM mirror forum (see automation.dm_mirror): every PM
    # conversation gets one thread here; replies in the thread go back
    # into the game. 0 = off.
    dm_mirror: 1517694938501087342
    # Message panel (Send message / Check inbox / Reply buttons), placed
    # and maintained automatically. 0 = off.
    dm_panel: 1421242306136113254
    # Class-availability panel: free training classes per agency, updated
    # hourly (edited in place). 0 = off.
    class_panel: 1421627971831070730
    # Academy-build panel (Fire/Police/Rescue/Coastal buttons). 0 = off.
    academy_panel: 1426226521231589507
  # Role ids allowed to use admin commands (besides server administrators).
  admin_role_ids: []
  # Role that is always pinged by the eventpinger (Notify-Event).
  notify_event_role_id: 669496241591418890
  # Role pinged on new/updated-mission announcements in the
  # mission_announce channel (0 = message without a ping).
  mission_announce_role_id: 0
  # Role pinged on new-vehicle announcements in the vehicle_announce
  # channel (0 = message without a ping).
  vehicle_announce_role_id: 0
  # Eventpinger announcement watcher: the channel where the official
  # MissionChief app announces every alliance mission/event start (also
  # manual ones) and that app's user id. Each announcement gets a reply
  # pinging Notify-Event + the resolved region role. 0 = watcher off.
  event_watch_channel_id: 544461383358480385
  event_watch_app_id: 743939319122886657

automation:
  # SAFETY FIRST: with dry_run on, the bot detects and reports board
  # requests but performs NO actions on MissionChief (no trainings
  # started, no buildings built, no events created). Set to false once
  # you've watched a few dry runs and trust the detection.
  dry_run: true
  # Post confirmation replies in the board threads ([FRA] marker).
  reply_to_board: true
  applications:
    # Accept every new alliance application automatically (in-game).
    # With this off — or when an auto-accept fails — the announcement in
    # the applications channel carries Accept/Deny buttons instead, so
    # admins decide from Discord. Honours dry_run.
    auto_accept: false
  chat:
    # Alliance chat ↔ Discord bridge: mirrors the game's alliance chat
    # into discord.channels.chat_bridge and relays human messages from
    # that channel back into the game as "[DiscordName] text". First
    # sync only baselines (no history flood); game posts are spaced
    # ≥30 s apart. Relaying into the game honours dry_run.
    enabled: false
    interval_seconds: 30
  sanctions:
    # Sanctions register (!sanction add/list/stats/revoke). The bot only
    # RECORDS and announces — it never kicks or bans anyone itself. With
    # auto_action_enabled, a member's 3rd official warning posts the
    # configured follow-up (Kick/Ban) as an ADVISORY to the admin log.
    auto_action_enabled: false
    third_warning_action: Kick
  training:
    enabled: false            # master switch for training auto-start
    thread_id: 5935           # /alliance_threads/<id> with training requests
    interval: 5               # poll interval in minutes
    min_contribution_rate: 5.0
    # OPTIONAL. The bot already finds every academy of the right discipline
    # from the alliance building list and, if one has no free classroom, moves
    # on to the next — you do NOT need to list academies here. This is only a
    # hint to try a specific building first (and a fallback if the building
    # list can't be read). Leave it empty ({}) to let the bot pick any.
    preferred_academies: {}
  building:
    enabled: false            # master switch for hospital/prison builds
    thread_id: 6165
    interval: 5
    # Minimum alliance contribution % before a Discord building request is
    # accepted (checked at intake, like trainings/events/missions).
    min_contribution_rate: 5.0
    # Never build when alliance funds are below this (live check).
    min_alliance_funds: 2000000
    # Alliance tax to set on newly built buildings (0/10/20/30/40/50).
    set_tax_percent: 20
    # Daily worldwide auto-build: one hospital + one prison per day at a real
    # OpenStreetMap location, picked at random from across the world. Each
    # build is skipped until tomorrow if alliance funds are below the floor
    # above, and never placed within 250 m of an existing same-type building.
    # Honours dry_run (reports what it would build). Off by default.
    daily_build_enabled: false
    daily_build_time: "03:00"   # HH:MM in reports.timezone
  academy:
    # Discord-panel academy builds at a FIXED address (duplicates allowed).
    # Staff click Fire/Police/Rescue/Coastal; the bot builds "[AA] <type>
    # academy #N" (next number scanned live). Too little money -> queued and
    # retried by this poller once funds recover. Honours dry_run.
    enabled: false            # master switch for the funds-retry queue poller
    role_id: 0                # role allowed to click (0 = admins only)
    interval: 10              # queue retry interval in minutes
    address: "Tepper Avenue, 10454 New York, Manhattan"
    min_alliance_funds: 2000000
    # Auto-scale: when a discipline (fire/police/ems/coastal) runs out of free
    # classrooms, automatically build a new academy of that type. Off by
    # default — it spends alliance funds. Anti-runaway: the 0 must persist a
    # couple of hourly checks, then a 24h per-discipline cooldown applies, only
    # one auto-build runs at a time, and member hospital/prison requests take
    # the funds first. Low funds just queue the build.
    autoscale: false
  events:
    enabled: false            # master switch for event/mission starts
    thread_id: 15293
    interval: 5
    min_contribution_rate: 5.0
  mission:
    # Unified mission/event system. Members request an alliance EVENT or a
    # LARGE scale alliance mission via the Discord panel / /mission slash
    # command, or a structured board post. They can supply a custom "Own
    # mission" (required-unit values), pick one of the game's SAVED missions
    # by name, or take a preset, and mark it one-time or recurring. Recurring
    # requests join the rotation list (admins manage it with `!fra rotation`).
    # The scheduler serves member requests first, then cycles the rotation to
    # fill free slots. Queued and started at the next FREE slot; starts still
    # honour the global dry_run switch above and never spend coins.
    enabled: false            # master switch: runs the queue + rotation scheduler
    board_enabled: false      # also parse structured mission posts from the board
    thread_id: 15310          # board thread scanned when board_enabled
    interval: 5               # poll interval in minutes
    # Channel where `!fra missionpanel` posts the request panel.
    panel_channel_id: 1425234755842080890
    # Board requests are self-serve; skip members below this contribution.
    min_contribution_rate: 5.0
  missions_forum:
    # Missions-database forum: every mission from missionchief.com's
    # einsaetze.json gets its own tagged forum post (all information, in
    # English). The bot manages the forum itself: it creates the tag set,
    # requires a tag on every post, adds new missions daily and edits a
    # post in place when a mission's data changes — never a duplicate.
    # The forum channel id lives under discord.channels.missions_forum.
    enabled: false
    sync_time: "04:00"        # HH:MM in reports.timezone
    # Announce brand-new missions (with a link to the forum post) in
    # discord.channels.mission_announce. Off by default.
    announce_new: false
    # Posts/edits per sync run — spreads the initial ~1,200-mission backfill
    # over a few runs and keeps rate limits comfortable.
    max_posts_per_run: 100
  rank_roles:
    # Credit rank roles (the old bot's RoleBasedCredits): every verified/
    # linked member carries ONE Discord rank role based on MissionChief
    # earned credits — Probie (0) → Firefighter (200) → Senior Firefighter
    # (10k) → Fire Apparatus Operator (100k) → Lieutenant (1M) → Captain
    # (5M) → Staff Captain (20M) → Battalion Chief (50M) → Division Chief
    # (1B) → Deputy Chief (2B) → Fire Chief (5B) → Fire Commissioner (10B).
    # Promotions are congratulated in promotion_channel_id (only after the
    # first sync established a baseline — no spam on rollout). Members who
    # leave the alliance lose their rank roles automatically.
    enabled: false
    interval: 60                # minutes between syncs
    promotion_channel_id: 543935264708362251
    # Also congratulate a member's very FIRST rank assignment.
    announce_first_assignment: false
    # Override rank→role ids per rank key (defaults are the old bot's):
    # role_ids:
    #   probie: 669488072911618048
    #   fire_commissioner: 1437513734364069940
    role_ids: {}
  dm_mirror:
    # In-game DM mirror: scans the MissionChief PM inbox and mirrors every
    # conversation — incoming messages AND conversations the bot account
    # started (tax warnings, requester DMs) — into the
    # discord.channels.dm_mirror forum, one thread per conversation. A
    # staff reply typed in such a thread is sent back into the game
    # conversation (✅ = delivered; replies honour dry_run). The scan
    # itself is read-only and also runs in dry-run.
    enabled: false
    interval: 15              # minutes between inbox scans
  tax_warnings:
    # Automated member tax (alliance donation) warnings, like the old bot:
    # members below min_rate get an in-game PM — a friendly reminder first,
    # then two official warnings, at least min_days_between days apart,
    # capped at three. New members get grace_hours before the first one.
    # After the third unresolved warning the member is flagged KICK DUE in
    # the admin channel; the kick only happens automatically with auto_kick
    # on. A member who fixes their donation is RESET immediately — warnings
    # stop, and a later dip starts over at warning 1. Honours dry_run.
    enabled: false
    min_rate: 5.0
    min_days_between: 7
    grace_hours: 24
    max_per_run: 5
    auto_kick: false
    interval_hours: 6

geocoding:
  # Turns a place name / address into coordinates. (Google Maps links never
  # need this — the coordinates are read straight from the URL.)
  #
  # WHERE THE KEY GOES — this trips people up, so read it once:
  #   * the API KEY goes ONLY in .env, as  GEOCODER_API_KEY=<your key>
  #     (it is a secret; it is NEVER put in this file).
  #   * here you only choose the PROVIDER (base_url) and the name of the query
  #     parameter it expects the key in (api_key_param).
  #
  # This bot uses maps.co (free key, higher limits than Nominatim). Keep the
  # two lines below AND set GEOCODER_API_KEY in .env — without the key maps.co
  # returns HTTP 401.
  base_url: https://geocode.maps.co
  api_key_param: api_key
  #
  # Alternatives:
  #   free OSM Nominatim (no key, ~1 req/s, stricter limits):
  #     base_url: https://nominatim.openstreetmap.org
  #   LocationIQ:
  #     base_url: https://us1.locationiq.com/v1   api_key_param: key
  #
  # A real contact email is polite (Nominatim's usage policy asks for it).
  contact_email: ""
  # Minimum seconds between geocode requests (free tiers are ~1 req/s).
  min_interval_seconds: 1.1

reports:
  # Reports are generated after the MissionChief daily reset (midnight
  # America/New_York). Delay a few minutes to let the site settle.
  daily_delay_minutes: 10
  timezone: America/New_York

  # Scheduled reports. Each entry renders a registered report to a channel
  # on the given cadence, shortly after the daily reset. Run `!fra report
  # list` in Discord to see the available report names and their periods.
  #   report:     registered report name (e.g. credits, members, treasury)
  #   period:     today | yesterday | week | month | prev-month | year | prev-year | all
  #   cadence:    daily | weekly | monthly | yearly
  #   channel_id: Discord channel to post in
  #   weekday:    for weekly cadence, 0=Monday … 6=Sunday
  #   day:        for monthly/yearly cadence, day-of-month to fire on
  #   month:      for yearly cadence, month to fire in (1=January)
  #
  # Example below: daily/weekly/monthly/yearly top-10 EARNERS (credits earned
  # in the period). Longer periods fill in as member snapshots accumulate.
  scheduled: []
    # - report: credits          # daily top earners
    #   period: yesterday
    #   cadence: daily
    #   channel_id: 1524076847267053619
    # - report: credits          # weekly top earners (posted Monday)
    #   period: week
    #   cadence: weekly
    #   weekday: 0
    #   channel_id: 1524076847267053619
    # - report: credits          # monthly top earners (posted on the 1st)
    #   period: prev-month
    #   cadence: monthly
    #   day: 1
    #   channel_id: 1524076847267053619
    # - report: credits          # yearly top earners (posted Jan 1)
    #   period: prev-year
    #   cadence: yearly
    #   month: 1
    #   day: 1
    #   channel_id: 1524076847267053619

logging:
  level: INFO
  # Rotating file log next to the database; console logging is always on.
  path: logs/fra_bot.log
  max_bytes: 5242880   # 5 MiB
  backup_count: 5
